name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: |
          npm run build
          ls -lah
          ls -lah dist || echo "NO DIST"

      - name: Zip
        run: |
          test -d dist || (echo "dist missing" && exit 1)
          zip -r dist.zip dist
          ls -lah dist.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist.zip